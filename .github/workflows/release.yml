name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binaries
        run: deno task compile

      - name: Upload release assets
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/wtctw-linux-x64 \
            dist/wtctw-linux-arm64 \
            dist/wtctw-mac-x64 \
            dist/wtctw-mac-arm64 \
            dist/wtctw-windows-x64.exe
        env:
          GH_TOKEN: ${{ github.token }}
